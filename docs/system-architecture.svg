  <text x="1475" y="247" text-anchor="middle" class="boxText">Server</text>

  <rect x="1405" y="315" width="140" height="74" rx="22" class="db"/>
  <text x="1475" y="343" text-anchor="middle" class="boxText">Google APIs</text>
  <text x="1475" y="362" text-anchor="middle" class="boxText">Places / Maps</text>

  <rect x="1405" y="430" width="140" height="74" rx="22" class="code"/>
  <text x="1475" y="458" text-anchor="middle" class="boxText">Browser</text>
  <text x="1475" y="477" text-anchor="middle" class="boxText">Storage</text>

  <line x1="470" y1="872" x2="1405" y2="237" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="860" y1="872" x2="1405" y2="352" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="1265" y1="672" x2="1405" y2="467" class="arrow" marker-end="url(#arrowhead)"/>

  <!-- Notes -->
  <polygon points="1010,302 1110,302 1132,282 1032,282" class="note"/>
  <text x="1071" y="296" text-anchor="middle" class="tiny">User asks AI for destination ideas</text>

  <polygon points="1010,372 1125,372 1147,352 1032,352" class="note"/>
  <text x="1088" y="366" text-anchor="middle" class="tiny">User reviews route, swaps stops, opens maps</text>

  <polygon points="1010,232 1115,232 1137,212 1032,212" class="note"/>
  <text x="1074" y="226" text-anchor="middle" class="tiny">User already knows destination</text>
</svg>
