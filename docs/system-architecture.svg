  <rect x="820" y="210" width="150" height="54" rx="16" class="code"/>
  <text x="895" y="232" text-anchor="middle" class="small">Planner Wizard</text>
  <text x="895" y="249" text-anchor="middle" class="small">Pipeline</text>

  <rect x="820" y="280" width="150" height="54" rx="16" class="llm"/>
  <text x="895" y="302" text-anchor="middle" class="small">AI Suggestion</text>
  <text x="895" y="319" text-anchor="middle" class="small">Chat Pipeline</text>

