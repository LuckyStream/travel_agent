  <circle cx="800" cy="545" r="9" stroke="#5f5a53" stroke-width="2" fill="none"/>
  <line x1="800" y1="554" x2="800" y2="580" stroke="#5f5a53" stroke-width="2"/>
  <line x1="786" y1="566" x2="814" y2="566" stroke="#5f5a53" stroke-width="2"/>
  <line x1="800" y1="580" x2="787" y2="602" stroke="#5f5a53" stroke-width="2"/>
