<svg width="1600" height="1100" viewBox="0 0 1600 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 18px 'DM Sans', Arial, sans-serif; fill: #3b332b; }
      .label { font: 600 14px 'DM Sans', Arial, sans-serif; fill: #4b433b; }
      .small { font: 500 12px 'DM Sans', Arial, sans-serif; fill: #5d554b; }
      .tiny { font: 500 11px 'DM Sans', Arial, sans-serif; fill: #6f665d; }
      .boxText { font: 600 13px 'DM Sans', Arial, sans-serif; fill: #3f372f; }
      .legendText { font: 600 13px 'DM Sans', Arial, sans-serif; fill: #4f463d; }
      .groupTitle { font: 700 16px 'DM Sans', Arial, sans-serif; fill: #6d3b3b; }
      .arrow { stroke: #5f5a53; stroke-width: 2.2; fill: none; }
      .group { fill: #f4d9d7; stroke: #d9a7a2; stroke-width: 2; }
      .code { fill: #dbe8ff; stroke: #9bb9ea; stroke-width: 2; }
      .db { fill: #ddead4; stroke: #a8c59b; stroke-width: 2; }
      .llm { fill: #fdf0bd; stroke: #e8ca72; stroke-width: 2; }
      .vec { fill: #e6dbef; stroke: #bea5d7; stroke-width: 2; }
      .io { fill: #ffffff; stroke: #b9b0a5; stroke-width: 2; }
      .note { fill: #fff; stroke: #cdbfae; stroke-width: 1.6; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#5f5a53"/>
    </marker>
  </defs>

  <rect width="1600" height="1100" fill="#fffdf9"/>

  <text x="800" y="48" text-anchor="middle" class="title">Personal Traveling Agent - System Architecture</text>

  <!-- Legend -->
  <g transform="translate(50,90)">
    <ellipse cx="26" cy="18" rx="26" ry="18" class="io"/>
    <text x="70" y="22" class="legendText">Input / Output</text>

    <rect x="0" y="52" width="52" height="34" rx="17" class="code"/>
    <text x="70" y="74" class="legendText">Code / Frontend / API</text>

    <rect x="0" y="98" width="52" height="34" rx="17" class="db"/>
    <text x="70" y="120" class="legendText">Data / Session / External Service</text>

    <rect x="0" y="144" width="52" height="34" rx="17" class="vec"/>
    <text x="70" y="166" class="legendText">Planning / Logic Layer</text>

    <rect x="0" y="190" width="52" height="34" rx="17" class="llm"/>
    <text x="70" y="212" class="legendText">LLM Involvement</text>
  </g>

  <!-- User and entry -->
  <g transform="translate(620,95)">
    <circle cx="20" cy="20" r="10" stroke="#5f5a53" stroke-width="2" fill="none"/>
    <line x1="20" y1="30" x2="20" y2="62" stroke="#5f5a53" stroke-width="2"/>
    <line x1="4" y1="46" x2="36" y2="46" stroke="#5f5a53" stroke-width="2"/>
    <line x1="20" y1="62" x2="5" y2="86" stroke="#5f5a53" stroke-width="2"/>
    <line x1="20" y1="62" x2="35" y2="86" stroke="#5f5a53" stroke-width="2"/>
    <text x="20" y="106" text-anchor="middle" class="label">User</text>
  </g>

  <rect x="585" y="230" width="110" height="66" rx="22" class="code"/>
  <text x="640" y="257" text-anchor="middle" class="boxText">Home /</text>
  <text x="640" y="276" text-anchor="middle" class="boxText">Header UI</text>

  <line x1="640" y1="201" x2="640" y2="230" class="arrow" marker-end="url(#arrowhead)"/>

