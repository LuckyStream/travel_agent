  <text x="410" y="766" text-anchor="middle" class="boxText">/api/chat</text>
  <text x="410" y="785" text-anchor="middle" class="boxText">Route</text>

  <rect x="350" y="840" width="120" height="64" rx="22" class="llm"/>
  <text x="410" y="866" text-anchor="middle" class="boxText">Ollama</text>
  <text x="410" y="885" text-anchor="middle" class="boxText">Reasoning</text>

