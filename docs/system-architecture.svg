  <text x="1270" y="885" text-anchor="middle" class="boxText">/ Swap APIs</text>

  <polygon points="1205,930 1280,1005 1205,1080 1130,1005" class="db"/>
  <text x="1205" y="1001" text-anchor="middle" class="small">Mapped &</text>
  <text x="1205" y="1018" text-anchor="middle" class="small">Refined Itinerary</text>

  <line x1="1205" y1="620" x2="1205" y2="640" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="1205" y1="704" x2="1205" y2="740" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="1205" y1="804" x2="1140" y2="840" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="1205" y1="804" x2="1270" y2="840" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="1140" y1="904" x2="1188" y2="960" class="arrow" marker-end="url(#arrowhead)"/>
  <line x1="1270" y1="904" x2="1222" y2="960" class="arrow" marker-end="url(#arrowhead)"/>

  <polygon points="910,725 1080,725 1102,705 932,705" class="note"/>
  <text x="1006" y="719" text-anchor="middle" class="tiny">Generated items, place IDs, coords</text>
  <line x1="1102" y1="715" x2="1145" y2="672" class="arrow" marker-end="url(#arrowhead)"/>

