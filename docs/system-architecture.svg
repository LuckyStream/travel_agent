  <line x1="410" y1="554" x2="410" y2="580" stroke="#5f5a53" stroke-width="2"/>
  <line x1="396" y1="566" x2="424" y2="566" stroke="#5f5a53" stroke-width="2"/>
  <line x1="410" y1="580" x2="397" y2="602" stroke="#5f5a53" stroke-width="2"/>
  <line x1="410" y1="580" x2="423" y2="602" stroke="#5f5a53" stroke-width="2"/>
